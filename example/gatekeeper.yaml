
objects:
  - name: User
    package: example
    path: ./example/
    fields:
      - name: FirstName
        kind: string
        kindErr: "%(field) must be a string"
        validators:
          - name: minLen
            value: 3
            error: "%(field) must be >= %(expected) characters"
          - name: maxLen
            value: 10
            error: "%(field) must be <= %(expected) characters"

      - name: LastName
        kind: string
        formName: "last name"
        minLen: 3
        maxLen: 10
        custom:
            - function: NoWhiteSpace

      - name: Age
        formName: age
        kind: int
        min: 18
        max: 100
            
      - name: Email
        kind: string
        validators:
          - name: email
            error: "Email must a a valid email"
        

      - name: BirthMonth
        kind: string
        formName: birth month
        validators:
          - name: option
            error: "birth month must be a valid month"
            value:
              - January
              - February
              - March
              - April
              - May
              - June
              - July
              - August
              - September
              - October
              - November
              - December
            

  - name: Search
    package: example
    path: example
    fields:
      - name: QueryString
        formName: search
        kind: string
        minLen: 1
        maxLen: 24
      - name: ResultCount
        formName: result count
        kind: int
        options:
          - 10
          - 20
          - 50
          - 100


